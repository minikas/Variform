<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Variform Figma Plugin</title>
    <style>
      html { height: 100%; }
      body { margin: 0; padding: 0; }
      /* figma-kit only sets font-family per component class; apply the base
         font here so plain text (e.g. accordion labels) doesn't fall back to
         the browser default serif font. */
      #root {
        min-height: 100vh;
        font-family: var(--font-family-default, Inter, ui-sans-serif, system-ui, sans-serif);
        font-size: var(--font-size-default, 11px);
        color: var(--figma-color-text);
        -webkit-font-smoothing: antialiased;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./ui.tsx"></script>
  </body>
</html>
